<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Tasbih — Sacred Counter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Noto+Naskh+Arabic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════
   ROOT VARIABLES & RESET
═══════════════════════════════════════════ */
      :root {
        --gold: #c9a84c;
        --gold-l: #f0d080;
        --gold-d: #8a6a1e;
        --gold-g: rgba(201, 168, 76, 0.35);
        --jade: #3d7a5c;
        --jade-l: #52a87c;
        --bg0: #070604;
        --bg1: #0e0c08;
        --bg2: #181410;
        --bg3: #221d15;
        --cream: #f5e6c8;
        --white: #fff;
        --r: 14px;
        --accent: #c9a84c;
        --theme-hue: 38;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 150%;
        overflow: hidden;
      }
      body {
        background: var(--bg0);
        color: var(--cream);
        font-family: "Playfair Display", serif;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════
   CANVAS & PARTICLES
═══════════════════════════════════════════ */
      #bgCanvas,
      #partCanvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #bgCanvas {
        z-index: 0;
      }
      #partCanvas {
        z-index: 50;
      }

      /* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
      .shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 18px 10px;
        border-bottom: 1px solid rgba(201, 168, 76, 0.1);
        background: rgba(7, 6, 4, 0.7);
        backdrop-filter: blur(12px);
        flex-shrink: 0;
      }
      .topbar-brand {
        font-family: "Cinzel Decorative", serif;
        font-size: 13px;
        letter-spacing: 4px;
        background: linear-gradient(135deg, var(--gold-l), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .topbar-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: rgba(201, 168, 76, 0.07);
        border: 1px solid rgba(201, 168, 76, 0.15);
        color: var(--gold);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s;
      }
      .icon-btn:hover {
        background: rgba(201, 168, 76, 0.15);
        border-color: rgba(201, 168, 76, 0.4);
      }
      .icon-btn.active {
        background: rgba(201, 168, 76, 0.2);
        border-color: var(--gold);
        color: var(--gold-l);
      }

      /* ═══════════════════════════════════════════
   LANG PILL ROW
═══════════════════════════════════════════ */
      .lang-row {
        display: flex;
        gap: 6px;
        justify-content: center;
        padding: 8px 16px;
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .lang-row::-webkit-scrollbar {
        display: none;
      }
      .lang-pill {
        font-size: 11px;
        letter-spacing: 1.5px;
        white-space: nowrap;
        padding: 5px 12px;
        border-radius: 20px;
        background: transparent;
        border: 1px solid rgba(201, 168, 76, 0.18);
        color: rgba(201, 168, 76, 0.5);
        cursor: pointer;
        transition: all 0.25s;
        font-family: "Playfair Display", serif;
      }
      .lang-pill:hover {
        color: var(--gold);
        border-color: rgba(201, 168, 76, 0.45);
      }
      .lang-pill.active {
        background: linear-gradient(135deg, var(--gold-d), var(--gold));
        border-color: transparent;
        color: var(--bg0);
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.35);
      }

      /* ═══════════════════════════════════════════
   THEME TABS (design picker)
═══════════════════════════════════════════ */
      .design-row {
        display: flex;
        gap: 0;
        padding: 0 16px 0;
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .design-row::-webkit-scrollbar {
        display: none;
      }
      .design-tab {
        font-family: "Cinzel Decorative", serif;
        font-size: 9px;
        letter-spacing: 2px;
        padding: 8px 14px;
        cursor: pointer;
        color: rgba(201, 168, 76, 0.4);
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        transition: all 0.25s;
        background: transparent;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      .design-tab:hover {
        color: var(--gold);
      }
      .design-tab.active {
        color: var(--gold-l);
        border-bottom-color: var(--gold);
        text-shadow: 0 0 12px rgba(201, 168, 76, 0.5);
      }

      /* ═══════════════════════════════════════════
   DHIKR SELECTOR
═══════════════════════════════════════════ */
      .dhikr-row {
        display: flex;
        gap: 6px;
        padding: 8px 16px;
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .dhikr-row::-webkit-scrollbar {
        display: none;
      }
      .dhikr-chip {
        font-family: "Noto Naskh Arabic", serif;
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(201, 168, 76, 0.15);
        color: rgba(201, 168, 76, 0.6);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.25s;
        direction: rtl;
      }
      .dhikr-chip:hover {
        color: var(--gold);
        border-color: rgba(201, 168, 76, 0.4);
      }
      .dhikr-chip.active {
        background: rgba(201, 168, 76, 0.12);
        border-color: var(--gold);
        color: var(--gold-l);
        box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
      }

      /* ═══════════════════════════════════════════
   COUNTER STAGE (scrollable area)
═══════════════════════════════════════════ */
      .stage {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 16px 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(201, 168, 76, 0.2) transparent;
      }

      /* ═══════════════════════════════════════════
   === DESIGN 1: 3D ORB ===
═══════════════════════════════════════════ */
      .d-orb {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
      }

      .orb-scene {
        perspective: 1400px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .orb-wrap {
        width: clamp(180px, 50vw, 230px);
        height: clamp(180px, 50vw, 230px);
        position: relative;
        transform-style: preserve-3d;
        animation: orbFloat 7s ease-in-out infinite;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: rotateX(6deg) rotateY(0deg) translateY(0);
        }
        33% {
          transform: rotateX(9deg) rotateY(6deg) translateY(-10px);
        }
        66% {
          transform: rotateX(4deg) rotateY(-4deg) translateY(-14px);
        }
      }
      .orb-shadow-el {
        position: absolute;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        width: 70%;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(
          ellipse,
          rgba(201, 168, 76, 0.28),
          transparent 70%
        );
        animation: orbShadow 7s ease-in-out infinite;
      }
      @keyframes orbShadow {
        0%,
        100% {
          transform: translateX(-50%) scaleX(1);
          opacity: 0.5;
        }
        66% {
          transform: translateX(-50%) scaleX(0.72);
          opacity: 0.18;
        }
      }
      .orb-ring {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 0%,
          rgba(201, 168, 76, 0.5) 25%,
          rgba(240, 208, 128, 0.8) 50%,
          rgba(201, 168, 76, 0.5) 75%,
          transparent 100%
        );
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 3px),
          black calc(100% - 2px)
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 3px),
          black calc(100% - 2px)
        );
        animation: ringRot 6s linear infinite;
      }
      .orb-ring2 {
        position: absolute;
        inset: -18px;
        border-radius: 50%;
        background: conic-gradient(
          from 180deg,
          transparent 0%,
          rgba(61, 122, 92, 0.4) 30%,
          rgba(82, 168, 124, 0.6) 50%,
          rgba(61, 122, 92, 0.4) 70%,
          transparent 100%
        );
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 2px),
          black calc(100% - 1px)
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 2px),
          black calc(100% - 1px)
        );
        animation: ringRot 10s linear infinite reverse;
      }
      @keyframes ringRot {
        to {
          transform: rotate(360deg);
        }
      }
      .orb-body {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 35% 28%,
            rgba(255, 255, 255, 0.13) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 68% 72%,
            rgba(61, 122, 92, 0.18) 0%,
            transparent 35%
          ),
          radial-gradient(
            circle at 50% 50%,
            #2e2208 0%,
            #1a1108 55%,
            #0a0704 100%
          );
        box-shadow:
          inset 0 -6px 24px rgba(0, 0, 0, 0.85),
          inset 0 5px 18px rgba(201, 168, 76, 0.13),
          0 0 50px rgba(201, 168, 76, 0.12),
          0 24px 60px rgba(0, 0, 0, 0.7);
        transition: box-shadow 0.3s;
      }
      .orb-scene:active .orb-body {
        box-shadow:
          inset 0 -6px 24px rgba(0, 0, 0, 0.7),
          inset 0 5px 18px rgba(201, 168, 76, 0.35),
          0 0 80px rgba(201, 168, 76, 0.45),
          0 0 140px rgba(201, 168, 76, 0.2),
          0 12px 40px rgba(0, 0, 0, 0.5);
      }
      .orb-shimmer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: repeating-conic-gradient(
          from 0deg at 50% 50%,
          rgba(201, 168, 76, 0.04) 0deg,
          transparent 4deg,
          rgba(201, 168, 76, 0.02) 8deg,
          transparent 12deg
        );
        animation: shimSpin 25s linear infinite;
      }
      @keyframes shimSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .orb-hl {
        position: absolute;
        top: 16%;
        left: 20%;
        width: 30%;
        height: 18%;
        background: radial-gradient(
          ellipse,
          rgba(255, 255, 255, 0.2),
          transparent 70%
        );
        border-radius: 50%;
        transform: rotate(-35deg);
      }
      .orb-ripples {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        overflow: hidden;
        pointer-events: none;
      }
      .orb-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .orb-num {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(36px, 12vw, 58px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -1px;
        background: linear-gradient(
          180deg,
          var(--gold-l) 0%,
          var(--gold) 50%,
          var(--gold-d) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 8px rgba(201, 168, 76, 0.45));
      }
      .orb-num.bump {
        animation: numBump 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes numBump {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.22);
        }
        100% {
          transform: scale(1);
        }
      }
      .orb-sublabel {
        font-family: "Amiri", serif;
        font-size: 11px;
        color: rgba(201, 168, 76, 0.45);
        letter-spacing: 3px;
        margin-top: 3px;
      }
      .orb-dhikr-inner {
        position: absolute;
        bottom: 19%;
        width: 100%;
        text-align: center;
        font-family: "Noto Naskh Arabic", serif;
        font-size: 13px;
        color: rgba(201, 168, 76, 0.38);
        direction: rtl;
        pointer-events: none;
      }

      /* ═══════════════════════════════════════════
   === DESIGN 2: ANALOG ROSARY ===
═══════════════════════════════════════════ */
      .d-rosary {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .rosary-svg-wrap {
        width: clamp(220px, 70vw, 300px);
        height: clamp(220px, 70vw, 300px);
        cursor: pointer;
        margin-bottom: 4px;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.6));
      }
      .rosary-svg-wrap:active {
        transform: scale(0.97);
      }
      .rosary-count-box {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(28px, 9vw, 44px);
        font-weight: 700;
        background: linear-gradient(135deg, var(--gold-l), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
        margin-bottom: 2px;
      }
      .rosary-dhikr-box {
        font-family: "Noto Naskh Arabic", serif;
        font-size: 16px;
        color: var(--gold);
        opacity: 0.7;
        text-align: center;
        direction: rtl;
      }

      /* ═══════════════════════════════════════════
   === DESIGN 3: DIGITAL LCD ===
═══════════════════════════════════════════ */
      .d-lcd {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 12px;
      }
      .lcd-device {
        width: clamp(260px, 80vw, 340px);
        background: linear-gradient(145deg, #1a2210, #0e1608, #1a2210);
        border-radius: 20px;
        padding: 20px;
        border: 2px solid rgba(120, 180, 80, 0.25);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.8),
          0 0 30px rgba(80, 180, 60, 0.08),
          0 20px 50px rgba(0, 0, 0, 0.8),
          inset 0 1px 0 rgba(120, 180, 80, 0.1);
        cursor: pointer;
      }
      .lcd-device:active {
        transform: scale(0.98);
      }
      .lcd-screen {
        background: #0a120a;
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 14px;
        border: 1px solid rgba(80, 180, 60, 0.15);
        box-shadow:
          inset 0 0 20px rgba(0, 0, 0, 0.8),
          inset 0 0 8px rgba(80, 180, 60, 0.05);
        position: relative;
        overflow: hidden;
      }
      .lcd-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(80, 180, 60, 0.03) 2px,
          rgba(80, 180, 60, 0.03) 4px
        );
        pointer-events: none;
      }
      .lcd-label {
        font-size: 9px;
        letter-spacing: 4px;
        color: rgba(80, 180, 60, 0.5);
        text-transform: uppercase;
        margin-bottom: 6px;
        font-family: "Playfair Display", serif;
      }
      .lcd-num {
        font-family: monospace;
        font-size: clamp(44px, 14vw, 72px);
        font-weight: 900;
        color: #4db840;
        letter-spacing: 4px;
        text-shadow:
          0 0 20px rgba(77, 184, 64, 0.6),
          0 0 6px rgba(77, 184, 64, 0.4);
        line-height: 1;
      }
      .lcd-num.bump {
        animation: numBump 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .lcd-dhikr {
        font-family: "Noto Naskh Arabic", serif;
        font-size: 13px;
        color: rgba(77, 184, 64, 0.6);
        direction: rtl;
        margin-top: 6px;
      }
      .lcd-sub-row {
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }
      .lcd-mini {
        background: rgba(80, 180, 60, 0.06);
        border-radius: 6px;
        padding: 6px 10px;
        flex: 1;
        border: 1px solid rgba(80, 180, 60, 0.1);
      }
      .lcd-mini-val {
        font-family: monospace;
        font-size: 16px;
        color: #4db840;
        text-shadow: 0 0 8px rgba(77, 184, 64, 0.5);
      }
      .lcd-mini-lbl {
        font-size: 8px;
        color: rgba(77, 184, 64, 0.4);
        letter-spacing: 2px;
      }
      .lcd-btns {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      .lcd-btn {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        background: linear-gradient(145deg, #253018, #1a2210);
        border: 1px solid rgba(80, 180, 60, 0.2);
        color: rgba(77, 184, 64, 0.7);
        font-size: 10px;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Playfair Display", serif;
      }
      .lcd-btn:hover {
        background: rgba(80, 180, 60, 0.12);
        color: #4db840;
      }
      .lcd-btn:active {
        transform: scale(0.95);
      }

      /* ═══════════════════════════════════════════
   === DESIGN 4: VINTAGE BRASS ===
═══════════════════════════════════════════ */
      .d-brass {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .brass-device {
        width: clamp(240px, 72vw, 300px);
        height: clamp(240px, 72vw, 300px);
        position: relative;
        cursor: pointer;
      }
      .brass-device:active .brass-face {
        transform: scale(0.97);
      }
      .brass-outer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #5a3e1b,
          #c9a84c,
          #8a6a1e,
          #e0c060,
          #c9a84c,
          #6b4e20,
          #c9a84c,
          #5a3e1b
        );
        box-shadow:
          0 0 0 3px #3a2810,
          0 8px 32px rgba(0, 0, 0, 0.8),
          0 0 24px rgba(201, 168, 76, 0.15),
          inset 0 2px 4px rgba(255, 255, 255, 0.1);
      }
      .brass-mid {
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8a6a1e, #c9a84c, #6b4e20, #e0c060);
        box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.5);
      }
      .brass-face {
        position: absolute;
        inset: 16px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 30%,
          #2e2210,
          #1a1208,
          #0e0a04
        );
        box-shadow:
          inset 0 -6px 20px rgba(0, 0, 0, 0.9),
          inset 0 4px 12px rgba(201, 168, 76, 0.1),
          0 0 30px rgba(201, 168, 76, 0.08);
        transition: transform 0.15s;
        overflow: hidden;
      }
      .brass-engrave {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: repeating-conic-gradient(
          from 0deg at 50% 50%,
          rgba(201, 168, 76, 0.05) 0deg,
          transparent 3deg,
          rgba(201, 168, 76, 0.03) 6deg,
          transparent 9deg
        );
      }
      .brass-tick-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }
      .brass-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .brass-num {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(34px, 11vw, 52px);
        font-weight: 900;
        background: linear-gradient(180deg, #f0d080, #c9a84c, #8a6a1e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 6px rgba(201, 168, 76, 0.5));
      }
      .brass-num.bump {
        animation: numBump 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .brass-roman {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 11px;
        color: rgba(201, 168, 76, 0.45);
        letter-spacing: 3px;
        margin-top: 2px;
      }
      .brass-needle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 44%;
        height: 2px;
        background: linear-gradient(
          90deg,
          rgba(201, 168, 76, 0.4),
          var(--gold-l),
          transparent
        );
        transform-origin: left center;
        border-radius: 2px;
        box-shadow: 0 0 6px rgba(201, 168, 76, 0.4);
        transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      .brass-center-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 35%,
          var(--gold-l),
          var(--gold-d)
        );
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px rgba(201, 168, 76, 0.6);
        z-index: 2;
      }

      /* ═══════════════════════════════════════════
   === DESIGN 5: MINIMAL ZEN ===
═══════════════════════════════════════════ */
      .d-zen {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 8px;
      }
      .zen-ring-wrap {
        position: relative;
        width: clamp(200px, 62vw, 260px);
        height: clamp(200px, 62vw, 260px);
        cursor: pointer;
      }
      .zen-ring-wrap:active {
        transform: scale(0.97);
      }
      .zen-svg {
        width: 100%;
        height: 100%;
      }
      .zen-count-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .zen-num {
        font-family: "DM Serif Display", serif;
        font-size: clamp(44px, 14vw, 68px);
        color: var(--cream);
        letter-spacing: -2px;
        line-height: 1;
        font-style: italic;
      }
      .zen-num.bump {
        animation: numBump 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .zen-frac {
        font-size: 12px;
        color: rgba(245, 230, 200, 0.35);
        letter-spacing: 2px;
        margin-top: 3px;
      }
      .zen-dhikr-below {
        font-family: "Noto Naskh Arabic", serif;
        font-size: 18px;
        color: var(--gold);
        opacity: 0.65;
        direction: rtl;
        text-align: center;
      }
      .zen-haiku {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 11px;
        color: rgba(245, 230, 200, 0.3);
        text-align: center;
        letter-spacing: 1px;
        max-width: 220px;
        line-height: 1.6;
      }

      /* ═══════════════════════════════════════════
   === DESIGN 6: NEON CYBER ===
═══════════════════════════════════════════ */
      .d-cyber {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 10px;
      }
      .cyber-box {
        width: clamp(260px, 82vw, 340px);
        background: #08080f;
        border-radius: 12px;
        border: 1px solid rgba(0, 220, 255, 0.25);
        box-shadow:
          0 0 0 1px rgba(0, 220, 255, 0.08),
          0 0 30px rgba(0, 220, 255, 0.08),
          inset 0 0 20px rgba(0, 0, 0, 0.6);
        padding: 20px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .cyber-box::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 220, 255, 0.02) 3px,
          rgba(0, 220, 255, 0.02) 4px
        );
        pointer-events: none;
      }
      .cyber-box:active {
        transform: scale(0.98);
      }
      .cyber-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
      }
      .cyber-badge {
        font-size: 8px;
        letter-spacing: 3px;
        color: rgba(0, 220, 255, 0.5);
        border: 1px solid rgba(0, 220, 255, 0.2);
        padding: 3px 8px;
        border-radius: 4px;
      }
      .cyber-signal {
        display: flex;
        gap: 3px;
        align-items: flex-end;
      }
      .cyber-bar {
        width: 3px;
        border-radius: 1px;
        background: rgba(0, 220, 255, 0.3);
      }
      .cyber-bar.on {
        background: #00dcff;
        box-shadow: 0 0 4px #00dcff;
      }
      .cyber-num {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(48px, 15vw, 76px);
        font-weight: 900;
        color: #00dcff;
        letter-spacing: 2px;
        line-height: 1;
        text-shadow:
          0 0 20px #00dcff,
          0 0 40px rgba(0, 220, 255, 0.4),
          0 0 80px rgba(0, 220, 255, 0.15);
      }
      .cyber-num.bump {
        animation: numBump 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cyber-dhikr {
        font-family: "Noto Naskh Arabic", serif;
        font-size: 14px;
        color: rgba(0, 220, 255, 0.45);
        direction: rtl;
        margin-top: 4px;
      }
      .cyber-grid {
        display: flex;
        gap: 6px;
        margin-top: 14px;
      }
      .cyber-cell {
        flex: 1;
        background: rgba(0, 220, 255, 0.04);
        border: 1px solid rgba(0, 220, 255, 0.1);
        border-radius: 6px;
        padding: 8px 6px;
        text-align: center;
      }
      .cyber-cell-val {
        font-family: "Cinzel Decorative", serif;
        font-size: 15px;
        color: #00dcff;
        text-shadow: 0 0 8px #00dcff;
      }
      .cyber-cell-lbl {
        font-size: 8px;
        color: rgba(0, 220, 255, 0.35);
        letter-spacing: 2px;
        margin-top: 2px;
      }
      .cyber-progress {
        height: 2px;
        background: rgba(0, 220, 255, 0.1);
        border-radius: 1px;
        margin-top: 12px;
        overflow: hidden;
      }
      .cyber-prog-fill {
        height: 100%;
        background: linear-gradient(90deg, #00dcff, rgba(0, 220, 255, 0.3));
        transition: width 0.3s;
        box-shadow: 0 0 8px #00dcff;
      }

      /* ═══════════════════════════════════════════
   SHARED BEAD TRACK
═══════════════════════════════════════════ */
      .bead-track {
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        padding: 8px 0 4px;
        flex-wrap: nowrap;
      }
      .bead {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        background: radial-gradient(circle at 35% 35%, #5a4220, #2a1a08);
        border: 1px solid rgba(201, 168, 76, 0.2);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        transition: all 0.25s;
      }
      .bead.lit {
        background: radial-gradient(circle at 35% 35%, #fff, var(--gold-l));
        border-color: var(--gold);
        box-shadow:
          0 0 10px rgba(201, 168, 76, 0.8),
          0 1px 4px rgba(0, 0, 0, 0.5);
        transform: scale(1.35);
      }
      .bead.done {
        background: radial-gradient(
          circle at 35% 35%,
          var(--jade-l),
          var(--jade)
        );
        border-color: var(--jade-l);
        box-shadow: 0 0 6px rgba(61, 122, 92, 0.5);
      }
      .bead-sep {
        width: 1px;
        height: 14px;
        background: rgba(201, 168, 76, 0.2);
        flex-shrink: 0;
      }

      /* ═══════════════════════════════════════════
   STATS BAR
═══════════════════════════════════════════ */
      .stats-bar {
        display: flex;
        gap: 0;
        width: 100%;
        max-width: 340px;
        border: 1px solid rgba(201, 168, 76, 0.12);
        border-radius: 10px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .stat {
        flex: 1;
        padding: 10px 8px;
        text-align: center;
        background: rgba(201, 168, 76, 0.025);
      }
      .stat + .stat {
        border-left: 1px solid rgba(201, 168, 76, 0.12);
      }
      .stat-v {
        font-family: "Cinzel Decorative", serif;
        font-size: 16px;
        color: var(--gold);
        display: block;
      }
      .stat-l {
        font-size: 8px;
        color: rgba(201, 168, 76, 0.38);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ═══════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════ */
      .prog-wrap {
        width: 100%;
        max-width: 340px;
        flex-shrink: 0;
      }
      .prog-meta {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: rgba(201, 168, 76, 0.38);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .prog-track {
        height: 3px;
        background: rgba(201, 168, 76, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--jade), var(--gold));
        transition: width 0.3s ease;
        box-shadow: 0 0 8px rgba(201, 168, 76, 0.4);
      }

      /* ═══════════════════════════════════════════
   CONTROLS ROW
═══════════════════════════════════════════ */
      .controls-row {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        padding: 8px 16px 12px;
        flex-shrink: 0;
        border-top: 1px solid rgba(201, 168, 76, 0.08);
        background: rgba(7, 6, 4, 0.6);
        backdrop-filter: blur(8px);
      }
      .ctrl {
        font-family: "Cinzel Decorative", serif;
        font-size: 9px;
        letter-spacing: 2px;
        color: rgba(201, 168, 76, 0.55);
        background: transparent;
        border: 1px solid rgba(201, 168, 76, 0.18);
        border-radius: 7px;
        padding: 9px 16px;
        cursor: pointer;
        transition: all 0.25s;
      }
      .ctrl:hover {
        color: var(--gold);
        border-color: rgba(201, 168, 76, 0.45);
        background: rgba(201, 168, 76, 0.05);
      }
      .ctrl.primary {
        background: linear-gradient(
          135deg,
          rgba(201, 168, 76, 0.15),
          rgba(201, 168, 76, 0.08)
        );
        border-color: rgba(201, 168, 76, 0.4);
        color: var(--gold-l);
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.1);
      }
      .ctrl.danger:hover {
        color: #e05555;
        border-color: rgba(224, 85, 85, 0.4);
        background: rgba(224, 85, 85, 0.05);
      }

      /* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
      .toast {
        position: fixed;
        top: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(-90px);
        background: linear-gradient(135deg, #1a1510, #0e0a04);
        border: 1px solid var(--gold);
        border-radius: 10px;
        padding: 10px 24px;
        font-family: "Noto Naskh Arabic", serif;
        font-size: 15px;
        color: var(--gold-l);
        text-align: center;
        direction: rtl;
        box-shadow:
          0 0 30px rgba(201, 168, 76, 0.4),
          0 10px 40px rgba(0, 0, 0, 0.7);
        transition:
          transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.5s;
        opacity: 0;
        z-index: 200;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ═══════════════════════════════════════════
   SETTINGS PANEL
═══════════════════════════════════════════ */
      .settings-overlay {
        position: fixed;
        inset: 0;
        z-index: 150;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .settings-overlay.open {
        display: flex;
      }
      .settings-sheet {
        width: 100%;
        max-width: 480px;
        background: linear-gradient(180deg, #1a1510, #0e0a06);
        border-radius: 20px 20px 0 0;
        border-top: 1px solid rgba(201, 168, 76, 0.2);
        padding: 20px 20px 40px;
        box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.8);
        animation: sheetUp 0.35s ease;
      }
      @keyframes sheetUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .settings-handle {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: rgba(201, 168, 76, 0.3);
        margin: 0 auto 20px;
      }
      .settings-title {
        font-family: "Cinzel Decorative", serif;
        font-size: 12px;
        letter-spacing: 4px;
        color: var(--gold);
        margin-bottom: 18px;
        text-align: center;
      }
      .settings-group {
        margin-bottom: 16px;
      }
      .settings-label {
        font-size: 9px;
        letter-spacing: 3px;
        color: rgba(201, 168, 76, 0.4);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .settings-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .settings-opt {
        padding: 7px 14px;
        border-radius: 8px;
        font-size: 11px;
        background: rgba(201, 168, 76, 0.05);
        border: 1px solid rgba(201, 168, 76, 0.15);
        color: rgba(201, 168, 76, 0.55);
        cursor: pointer;
        transition: all 0.2s;
      }
      .settings-opt:hover {
        color: var(--gold);
        border-color: rgba(201, 168, 76, 0.4);
      }
      .settings-opt.active {
        background: rgba(201, 168, 76, 0.15);
        border-color: var(--gold);
        color: var(--gold-l);
      }
      .settings-input {
        width: 100%;
        background: rgba(201, 168, 76, 0.05);
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--cream);
        font-size: 13px;
        font-family: "Playfair Display", serif;
        outline: none;
      }
      .settings-input:focus {
        border-color: rgba(201, 168, 76, 0.5);
      }

      /* ═══════════════════════════════════════════
   RIPPLE
═══════════════════════════════════════════ */
      .rip {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.35),
          transparent 70%
        );
        transform: scale(0);
        animation: ripOut 0.65s ease forwards;
        pointer-events: none;
      }
      @keyframes ripOut {
        to {
          transform: scale(3.5);
          opacity: 0;
        }
      }

      /* ═══════════════════════════════════════════
   UTILITY ANIMS
═══════════════════════════════════════════ */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fadein {
        animation: fadeIn 0.4s ease both;
      }

      /* scrollbar */
      .stage::-webkit-scrollbar {
        width: 3px;
      }
      .stage::-webkit-scrollbar-thumb {
        background: rgba(201, 168, 76, 0.2);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="partCanvas"></canvas>
    <div class="toast" id="toast"></div>

    <!-- SETTINGS OVERLAY -->
    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-sheet">
        <div class="settings-handle"></div>
        <div class="settings-title">SETTINGS</div>

        <div class="settings-group">
          <div class="settings-label">Target Count</div>
          <div class="settings-row" id="targetOpts">
            <div class="settings-opt active" data-val="33">33</div>
            <div class="settings-opt" data-val="99">99</div>
            <div class="settings-opt" data-val="100">100</div>
            <div class="settings-opt" data-val="500">500</div>
            <div class="settings-opt" data-val="1000">1000</div>
          </div>
          <div style="margin-top: 8px">
            <input
              class="settings-input"
              id="customTarget"
              type="number"
              placeholder="Custom target..."
              min="1"
            />
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-label">Sound</div>
          <div class="settings-row" id="soundOpts">
            <div class="settings-opt active" data-val="on">✦ On</div>
            <div class="settings-opt" data-val="off">✦ Off</div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-label">Vibration</div>
          <div class="settings-row" id="vibOpts">
            <div class="settings-opt active" data-val="on">✦ On</div>
            <div class="settings-opt" data-val="off">✦ Off</div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-label">Theme</div>
          <div class="settings-row" id="themeOpts">
            <div class="settings-opt active" data-val="dark">Night</div>
            <div class="settings-opt" data-val="dusk">Dusk</div>
            <div class="settings-opt" data-val="emerald">Emerald</div>
          </div>
        </div>

        <div style="margin-top: 6px">
          <div
            class="ctrl"
            style="width: 100%; text-align: center; padding: 12px"
            id="closeSettings"
          >
            CLOSE
          </div>
        </div>
      </div>
    </div>

    <div class="shell">
      <!-- TOP BAR -->
      <div class="topbar">
        <div class="topbar-brand">TASBIH</div>
        <div class="topbar-right">
          <button class="icon-btn" id="soundToggle" title="Sound">🔔</button>
          <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
        </div>
      </div>

      <!-- LANGUAGE ROW -->
      <div class="lang-row" id="langRow">
        <button class="lang-pill active" data-lang="ar">العربية</button>
        <button class="lang-pill" data-lang="en">English</button>
        <button class="lang-pill" data-lang="bn">বাংলা</button>
        <button class="lang-pill" data-lang="ur">اردو</button>
        <button class="lang-pill" data-lang="tr">Türkçe</button>
        <button class="lang-pill" data-lang="ms">Melayu</button>
        <button class="lang-pill" data-lang="id">Indonesia</button>
        <button class="lang-pill" data-lang="fr">Français</button>
      </div>

      <!-- DESIGN TABS -->
      <div class="design-row" id="designRow">
        <button class="design-tab active" data-d="orb">✦ 3D ORB</button>
        <button class="design-tab" data-d="rosary">◉ ROSARY</button>
        <button class="design-tab" data-d="brass">⚙ BRASS</button>
        <button class="design-tab" data-d="lcd">▣ DIGITAL</button>
        <button class="design-tab" data-d="zen">○ ZEN</button>
        <button class="design-tab" data-d="cyber">◈ CYBER</button>
      </div>

      <!-- DHIKR ROW -->
      <div class="dhikr-row" id="dhikrRow"></div>

      <!-- STAGE -->
      <div class="stage" id="stage">
        <!-- content injected by JS -->
      </div>

      <!-- BEAD TRACK -->
      <div class="bead-track" id="beadTrack"></div>

      <!-- PROGRESS -->
      <div class="prog-wrap" style="padding: 0 16px">
        <div class="prog-meta">
          <span id="progLabel">0 / 33</span>
          <span id="progPct">0%</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" id="progFill" style="width: 0%"></div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-bar" style="margin: 8px auto 0">
        <div class="stat">
          <span class="stat-v" id="sv-total">0</span
          ><span class="stat-l" id="sl-total">Total</span>
        </div>
        <div class="stat">
          <span class="stat-v" id="sv-cycles">0</span
          ><span class="stat-l" id="sl-cycles">Cycles</span>
        </div>
        <div class="stat">
          <span class="stat-v" id="sv-session">0</span
          ><span class="stat-l" id="sl-session">Session</span>
        </div>
        <div class="stat">
          <span class="stat-v" id="sv-streak">0</span
          ><span class="stat-l" id="sl-streak">Streak</span>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="controls-row">
        <button class="ctrl" id="undoBtn">↩ UNDO</button>
        <button class="ctrl primary" id="mainCountBtn">✦ COUNT</button>
        <button class="ctrl danger" id="resetBtn">⟳ RESET</button>
      </div>
    </div>

    <script>
      /* ═══════════════════ DATA ═══════════════════ */
      const DHIKR_DATA = [
        {
          ar: "سُبْحَانَ اللَّهِ",

        {

          tr: "Elhamdülillah",

        },
        {

          ur: "اللہ اکبر",
          tr: "Allahu Ekber",
          ms: "Allahu Akbar",
          id: "Allahu Akbar",
          fr: "Allahu Akbar",
          target: 34,
        },
        {
          ar: "لَا إِلَهَ إِلَّا اللَّهُ",
          en: "La ilaha illallah",
          bn: "লা ইলাহা ইল্লাল্লাহ",
          ur: "لا الہ الا اللہ",
          tr: "Lâ ilâhe illallah",
          ms: "La ilaha illallah",
          id: "La ilaha illallah",
          fr: "La ilaha illallah",
          target: 100,

      /* ═══════════════════ AUDIO ═══════════════════ */
      let actx;
      function initA() {
        if (!actx)
          actx = new (window.AudioContext || window.webkitAudioContext)();
      }
      function beep(f1, f2, dur, vol) {
        if (!soundOn) return;
        try {
          initA();
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.setValueAtTime(f1, actx.currentTime);
          if (f2)
            o.frequency.exponentialRampToValueAtTime(
              f2,
              actx.currentTime + dur,
            );
          g.gain.setValueAtTime(vol || 0.15, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        } catch (e) {}
      }
      function playClick() {
        beep(880, 500, 0.12, 0.18);
      }
      function playMilestone() {
        if (!soundOn) return;
        try {
          initA();
          [
            [0, 523],
            [0.15, 659],
            [0.3, 784],
            [0.5, 1046],
          ].forEach(([d, f]) => {
            const o = actx.createOscillator(),
              g = actx.createGain();
            o.connect(g);
            g.connect(actx.destination);
            o.frequency.value = f;
            g.gain.setValueAtTime(0, actx.currentTime + d);
            g.gain.linearRampToValueAtTime(0.14, actx.currentTime + d + 0.06);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              actx.currentTime + d + 0.45,
            );
            o.start(actx.currentTime + d);
            o.stop(actx.currentTime + d + 0.5);
          });
        } catch (e) {}
      }

      /* ═══════════════════ BG CANVAS ═══════════════════ */
      const bgC = document.getElementById("bgCanvas"),
        bgX = bgC.getContext("2d");
      const pC = document.getElementById("partCanvas"),
        pX = pC.getContext("2d");
      let W, H;
      function resize() {
        W = bgC.width = pC.width = window.innerWidth;
        H = bgC.height = pC.height = window.innerHeight;
        drawBG();
      }
      function drawBG() {
        bgX.clearRect(0, 0, W, H);
        const g = bgX.createRadialGradient(
          W / 2,
          H * 0.4,
          0,
          W / 2,
          H * 0.4,
          W * 0.7,
        );
        g.addColorStop(0, "rgba(201,168,76,0.06)");
        g.addColorStop(0.5, "rgba(61,122,92,0.03)");
        g.addColorStop(1, "rgba(7,6,4,0)");
        bgX.fillStyle = "#070604";
        bgX.fillRect(0, 0, W, H);
        bgX.fillStyle = g;
        bgX.fillRect(0, 0, W, H);
        // grid
        bgX.strokeStyle = "rgba(201,168,76,0.022)";
        bgX.lineWidth = 1;
        for (let x = 0; x < W; x += 55) {
          bgX.beginPath();
          bgX.moveTo(x, 0);
          bgX.lineTo(x, H);
          bgX.stroke();
        }
        for (let y = 0; y < H; y += 55) {
          bgX.beginPath();
          bgX.moveTo(0, y);
          bgX.lineTo(W, y);
          bgX.stroke();
        }
      }
      window.addEventListener("resize", resize);
      resize();

      /* ═══════════════════ PARTICLES ═══════════════════ */
      const parts = [];
      function spawnParts(x, y, col) {
        const clrs = col || [
          "#c9a84c",
          "#f0d080",
          "#8a6a1e",
          "#3d7a5c",
          "#ffffff",
        ];
        for (let i = 0; i < 16; i++) {
          const a = (Math.PI * 2 * i) / 16 + (Math.random() - 0.5) * 0.8;
          const s = 1.8 + Math.random() * 3.5;
          parts.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - 2,
            life: 1,
            sz: 2 + Math.random() * 3,
            c: clrs[Math.floor(Math.random() * clrs.length)],
          });
        }
      }
      function animParts() {
        pX.clearRect(0, 0, W, H);
        for (let i = parts.length - 1; i >= 0; i--) {
          const p = parts[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.09;
          p.life -= 0.022;
          if (p.life <= 0) {
            parts.splice(i, 1);
            continue;
          }
          pX.save();
          pX.globalAlpha = p.life;
          pX.fillStyle = p.c;
          pX.shadowColor = p.c;
          pX.shadowBlur = 6;
          pX.beginPath();
          pX.arc(p.x, p.y, p.sz * p.life, 0, Math.PI * 2);
          pX.fill();
          pX.restore();
        }
        requestAnimationFrame(animParts);
      }
      animParts();

      function updateRosarySVG() {
        const g = document.getElementById("rosaryBeads");
        if (!g) return;
        g.innerHTML = "";
        const n = Math.min(currentTarget, 33);
        const r = 95,
          cx = 150,
          cy = 150;
        const pos = count % currentTarget;
        const pct = pos / currentTarget;

        for (let i = 0; i < n; i++) {
          const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
          const x = cx + r * Math.cos(angle);
          const y = cy + r * Math.sin(angle);
          const bIdx = Math.floor((i / n) * n);
          const done = i < Math.floor(pct * n);
          const active = i === Math.floor(pct * n) && pos > 0;
          const fill = active
            ? "url(#bgActive)"
            : done
              ? "url(#bgDone)"
              : "url(#bg33)";
          const sz = active ? 8 : 6;
          const glow = active ? 'filter="url(#glow)"' : "";
          g.innerHTML += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${sz}" fill="${fill}" ${glow} opacity="${done || active ? 1 : 0.55}"/>`;
        }
        const numEl = document.getElementById("rosaryNum");
        if (numEl) numEl.textContent = count;
      }

      function updateBrassNeedle() {
        const needle = document.getElementById("brassNeedle");
        if (!needle) return;
        const pct = (count % currentTarget) / currentTarget;
        const deg = pct * 360 - 90;
        needle.style.transform = `translateY(-50%) rotate(${deg}deg)`;
        // draw ticks on canvas
        const canvas = document.getElementById("brassCanvas");
        if (!canvas) return;
        const ctx2 = canvas.getContext("2d");
        const W2 = canvas.width,
          H2 = canvas.height,
          cx = W2 / 2,
          cy = H2 / 2,
          r = W2 / 2;
        ctx2.clearRect(0, 0, W2, H2);
        const ticks = currentTarget <= 100 ? currentTarget : 50;
        for (let i = 0; i < ticks; i++) {
          const a = (i / ticks) * Math.PI * 2 - Math.PI / 2;
          const isMaj = i % (ticks / 10) === 0;
          const inner = r * (isMaj ? 0.78 : 0.84);
          const outer = r * 0.92;
          ctx2.beginPath();
          ctx2.moveTo(cx + inner * Math.cos(a), cy + inner * Math.sin(a));
          ctx2.lineTo(cx + outer * Math.cos(a), cy + outer * Math.sin(a));
          const pctI = i / ticks;
          const done = pctI < (count % currentTarget) / currentTarget;
          ctx2.strokeStyle = done
            ? "rgba(61,122,92,0.8)"
            : "rgba(201,168,76," + (isMaj ? ".7" : ".35") + ")";
          ctx2.lineWidth = isMaj ? 2 : 1;
          ctx2.stroke();
        }
        const el = document.getElementById("brassRoman");
        if (el) el.textContent = "الدورة " + toArabicNumerals(cycles);
      }

      function toArabicNumerals(n) {
        return String(n).replace(/\d/g, (d) => "٠١٢٣٤٥٦٧٨٩"[d]);
      }

      /* ─── LCD HTML ─── */
      function buildLCD() {
        return `<div class="d-lcd">
  <div class="lcd-device" id="lcd-device">
    <div class="lcd-screen">
      <div class="lcd-label">◉ DIGITAL TASBIH</div>
      <div class="lcd-num" id="dispCount">000</div>
      <div class="lcd-dhikr">${getDhikrText()}</div>
    </div>
    <div class="lcd-sub-row">
      <div class="lcd-mini">
        <div class="lcd-mini-val" id="lcdCycles">0</div>
        <div class="lcd-mini-lbl">CYCLES</div>
      </div>
      <div class="lcd-mini">
        <div class="lcd-mini-val" id="lcdSession">0</div>
        <div class="lcd-mini-lbl">SESSION</div>
      </div>
      <div class="lcd-mini">
        <div class="lcd-mini-val" id="lcdTotal">0</div>
        <div class="lcd-mini-lbl">TOTAL</div>
      </div>
    </div>
  </div>
  </div>`;
      }

      /* ─── ZEN HTML ─── */
      function buildZen() {
        const sz = Math.min(window.innerWidth * 0.6, 260);
        return `<div class="d-zen">
  <div class="zen-ring-wrap" id="zen-ring-wrap">
    <svg class="zen-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="zenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3d7a5c"/>
          <stop offset="100%" stop-color="#c9a84c"/>
        </linearGradient>
      </defs>
      <!-- bg ring -->
      <circle cx="130" cy="130" r="110" fill="none" stroke="rgba(201,168,76,0.07)" stroke-width="12"/>
      <!-- progress arc -->
      <circle cx="130" cy="130" r="110" fill="none" stroke="url(#zenGrad)"
        stroke-width="10" stroke-linecap="round"
        id="zenArc"
        stroke-dasharray="691.15"
        stroke-dashoffset="691.15"
        transform="rotate(-90 130 130)"
        style="transition:stroke-dashoffset .4s ease;filter:drop-shadow(0 0 6px rgba(201,168,76,0.4))"/>
      <!-- tick marks -->
      <g id="zenTicks" opacity="0.3"></g>
      <!-- inner circle -->
      <circle cx="130" cy="130" r="90" fill="rgba(7,6,4,0.8)"/>
      <circle cx="130" cy="130" r="88" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
    </svg>
    <div class="zen-count-overlay">
      <div class="zen-num" id="dispCount">0</div>
      <div class="zen-frac" id="zenFrac">0 / ${currentTarget}</div>
    </div>
  </div>
  <div class="zen-dhikr-below">${getDhikrText()}</div>
  <div class="zen-haiku" id="zenHaiku">Each breath a prayer,<br>Each count a step toward light,<br>The heart remembers.</div>
  </div>`;
      }

      function updateZenArc() {
        const arc = document.getElementById("zenArc");
        if (!arc) return;
        const circumference = 2 * Math.PI * 110;
        const pct = (count % currentTarget) / currentTarget;
        const offset = circumference * (1 - pct);
        arc.setAttribute("stroke-dashoffset", offset.toFixed(2));
        const frac = document.getElementById("zenFrac");
        if (frac) {
          const cur =
            count % currentTarget === 0 && count > 0
              ? currentTarget
              : count % currentTarget;
          frac.textContent = cur + " / " + currentTarget;
        }
        // draw ticks
        const tg = document.getElementById("zenTicks");
        if (!tg) return;
        tg.innerHTML = "";
        const ticks = Math.min(currentTarget, 66);
        for (let i = 0; i < ticks; i++) {
          const a = (i / ticks) * Math.PI * 2 - Math.PI / 2;
          const r = 110;
          const x1 = 130 + r * Math.cos(a),
            y1 = 130 + r * Math.sin(a);
          const r2 = r + (i % (ticks / 10) === 0 ? 14 : 8);
          const x2 = 130 + r2 * Math.cos(a),
            y2 = 130 + r2 * Math.sin(a);
          tg.innerHTML += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(201,168,76,.5)" stroke-width="${i % (ticks / 10) === 0 ? 1.5 : 0.7}"/>`;
        }
      }

      /* ─── CYBER HTML ─── */
      function buildCyber() {
        return `<div class="d-cyber">
  <div class="cyber-box" id="cyber-box">
    <div class="cyber-top">
      <div class="cyber-badge">◉ TASBIH SYS v2.0</div>
      <div class="cyber-signal">
        ${[1, 2, 3, 4, 5].map((v, i) => `<div class="cyber-bar on" style="height:${6 + i * 3}px" id="cbar${i}"></div>`).join("")}
      </div>
    </div>
    <div class="cyber-num" id="dispCount">000</div>
    <div class="cyber-dhikr">${getDhikrText()}</div>
    <div class="cyber-grid">
      <div class="cyber-cell"><div class="cyber-cell-val" id="cyberCyc">0</div><div class="cyber-cell-lbl">CYCLES</div></div>
      <div class="cyber-cell"><div class="cyber-cell-val" id="cyberSes">0</div><div class="cyber-cell-lbl">SESSION</div></div>
      <div class="cyber-cell"><div class="cyber-cell-val" id="cyberTot">0</div><div class="cyber-cell-lbl">TOTAL</div></div>
    </div>
    <div class="cyber-progress"><div class="cyber-prog-fill" id="cyberProg" style="width:0%"></div></div>
  </div>
  </div>`;
      }

      function updateCyberBars() {
        for (let i = 0; i < 5; i++) {
          const b = document.getElementById("cbar" + i);
          if (b) b.classList.toggle("on", Math.random() > 0.3);
        }
      }

      /* ═══════════════════ DISPLAY COUNT UPDATE ═══════════════════ */
      function updateDisplayCount() {
        const el = document.getElementById("dispCount");
        if (!el) return;
        const padded =
          currentDesign === "lcd" || currentDesign === "cyber"
            ? String(count).padStart(3, "0")
            : count;
        el.textContent = padded;

        // design-specific updates
        if (currentDesign === "rosary") updateRosarySVG();
        if (currentDesign === "brass") {
          updateBrassNeedle();
          const r = document.getElementById("brassRoman");
          if (r) r.textContent = "الدورة " + toArabicNumerals(cycles);
        }
        if (currentDesign === "zen") updateZenArc();
        if (currentDesign === "lcd") {
          const c = document.getElementById("lcdCycles");
          if (c) c.textContent = cycles;
          const s = document.getElementById("lcdSession");
          if (s) s.textContent = session;
          const t = document.getElementById("lcdTotal");
          if (t) t.textContent = totalEver;
        }
        if (currentDesign === "cyber") {
          const cyc = document.getElementById("cyberCyc");
          if (cyc) cyc.textContent = cycles;
          const ses = document.getElementById("cyberSes");
          if (ses) ses.textContent = session;
          const tot = document.getElementById("cyberTot");
          if (tot) tot.textContent = totalEver;
          const prog = document.getElementById("cyberProg");
          if (prog) {
            const cur =
              count % currentTarget === 0 && count > 0
                ? currentTarget
                : count % currentTarget;
            prog.style.width = (cur / currentTarget) * 100 + "%";
          }
          updateCyberBars();
        }
        // dhikr text in orb
        if (currentDesign === "orb") {
          const d = document.getElementById("orbDhikr");
          if (d) d.textContent = getDhikrText();
        }
      }

      /* ═══════════════════ MAIN COUNT ═══════════════════ */
      function doCount(e) {
        history.push(count);
        if (history.length > 60) history.shift();
        count++;
        totalEver++;
        session++;

        // streak
        const today = new Date().toDateString();
        if (today !== lastDate) {
          streak =
            lastDate === new Date(Date.now() - 86400000).toDateString()
              ? streak + 1
              : 1;
          lastDate = today;
        }

        playClick();
        vib(15);

        // bump
        bumpEl("dispCount");

        // ripple in orb
        const rr = document.getElementById("orb-ripples");
        if (rr) ripple(rr);
        const rr2 = document.getElementById("orb-ripples");
        if (rr2) ripple(rr2);

        // particles
        if (e && e.currentTarget) {
          const rect = e.currentTarget.getBoundingClientRect();
          const cx = rect.left + rect.width / 2,
            cy = rect.top + rect.height / 2;
          const cyberColors = ["#00dcff", "#00ffaa", "#0080ff"];
          const lcdColors = ["#4db840", "#80ff60", "#00ff40"];
          const col =
            currentDesign === "cyber"
              ? cyberColors
              : currentDesign === "lcd"
                ? lcdColors
                : null;
          spawnParts(cx, cy, col);
        }

        // milestone
        if (count % currentTarget === 0) {
          cycles++;
          playMilestone();
          vib([50, 30, 100]);
          const msgs = MILESTONES[currentLang] || MILESTONES.ar;
          toast(msgs[cycles % msgs.length]);
        }

        updateDisplayCount();
        updateProgress();
        updateBeads();
        updateStatsUI();
        save();
      }

      /* ═══════════════════ UNDO ═══════════════════ */
      function doUndo() {
        if (!history.length) return;
        const prev = history.pop();
        const diff = count - prev;
        if (diff > 0) {
          totalEver = Math.max(0, totalEver - diff);
          session = Math.max(0, session - diff);
          if (
            count % currentTarget < prev % currentTarget ||
            (count % currentTarget === 0 && prev % currentTarget !== 0)
          )
            cycles = Math.max(0, cycles - 1);
          count = prev;
        }
        updateDisplayCount();
        updateProgress();
        updateBeads();
        updateStatsUI();
        save();
      }

      /* ═══════════════════ RESET ═══════════════════ */
      function doReset() {
        if (!count && !session) return;
        history = [];
        count = 0;
        session = 0;
        cycles = 0;
        updateDisplayCount();
        updateProgress();
        updateBeads();
        updateStatsUI();
        save();
        toast("↺ Reset");
      }

      /* ═══════════════════ SAVE / LOAD ═══════════════════ */
      function save() {
        try {
          localStorage.setItem(
            "tasbih_ultra",
            JSON.stringify({
              count,
              totalEver,
              cycles,
              session,
              streak,
              lastDate,
              currentDhikrIdx,
              currentTarget,
              currentLang,
              currentDesign,
              soundOn,
              vibOn,
            }),
          );
        } catch (e) {}
      }
      function load() {
        try {
          const d = JSON.parse(localStorage.getItem("tasbih_ultra") || "null");
          if (!d) return;
          count = d.count || 0;
          totalEver = d.totalEver || 0;
          cycles = d.cycles || 0;
          session = 0;
          streak = d.streak || 0;
          lastDate = d.lastDate || "";
          currentDhikrIdx = d.currentDhikrIdx || 0;
          currentTarget = d.currentTarget || DHIKR_DATA[currentDhikrIdx].target;
          currentLang = d.currentLang || "ar";
          currentDesign = d.currentDesign || "orb";
          soundOn = d.soundOn !== false;
          vibOn = d.vibOn !== false;
        } catch (e) {}
      }

      /* ═══════════════════ DESIGN SWITCH ═══════════════════ */
      function switchDesign(d) {
        currentDesign = d;
        document
          .querySelectorAll(".design-tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.d === d));
        renderDesign();
        save();
      }
      document.getElementById("designRow").addEventListener("click", (e) => {
        const t = e.target.closest(".design-tab");
        if (t) switchDesign(t.dataset.d);
      });

      /* ═══════════════════ LANG SWITCH ═══════════════════ */
      function switchLang(l) {
        currentLang = l;
        document
          .querySelectorAll(".lang-pill")
          .forEach((p) => p.classList.toggle("active", p.dataset.lang === l));
        buildDhikrRow();
        renderDesign();
        updateStatsUI();
        save();
      }
      document.getElementById("langRow").addEventListener("click", (e) => {
        const p = e.target.closest(".lang-pill");
        if (p) switchLang(p.dataset.lang);
      });

      /* ═══════════════════ SOUND TOGGLE ═══════════════════ */
      document
        .getElementById("soundToggle")
        .addEventListener("click", function () {
          soundOn = !soundOn;
          this.textContent = soundOn ? "🔔" : "🔕";
          this.classList.toggle("active", !soundOn);
          save();
        });

      /* ═══════════════════ SETTINGS ═══════════════════ */
      document.getElementById("settingsBtn").addEventListener("click", () => {
        document.getElementById("settingsOverlay").classList.add("open");
      });
      document.getElementById("closeSettings").addEventListener("click", () => {
        document.getElementById("settingsOverlay").classList.remove("open");
      });
      document
        .getElementById("settingsOverlay")
        .addEventListener("click", (e) => {
          if (e.target === e.currentTarget)
            e.currentTarget.classList.remove("open");
        });

      // target opts
      document.getElementById("targetOpts").addEventListener("click", (e) => {
        const o = e.target.closest(".settings-opt");
        if (!o) return;
        document
          .querySelectorAll("#targetOpts .settings-opt")
          .forEach((x) => x.classList.remove("active"));
        o.classList.add("active");
        currentTarget = +o.dataset.val;
        count = 0;
        cycles = 0;
        history = [];
        renderDesign();
        updateStatsUI();
        save();
      });
      document
        .getElementById("customTarget")
        .addEventListener("change", function () {
          const v = parseInt(this.value);
          if (v > 0) {
            currentTarget = v;
            count = 0;
            cycles = 0;
            history = [];
            renderDesign();
            updateStatsUI();
            save();
          }
        });

      // sound opts
      document.getElementById("soundOpts").addEventListener("click", (e) => {
        const o = e.target.closest(".settings-opt");
        if (!o) return;
        document
          .querySelectorAll("#soundOpts .settings-opt")
          .forEach((x) => x.classList.remove("active"));
        o.classList.add("active");
        soundOn = o.dataset.val === "on";
        document.getElementById("soundToggle").textContent = soundOn
          ? "🔔"
          : "🔕";
        save();
      });
      // vib opts
      document.getElementById("vibOpts").addEventListener("click", (e) => {
        const o = e.target.closest(".settings-opt");
        if (!o) return;
        document
          .querySelectorAll("#vibOpts .settings-opt")
          .forEach((x) => x.classList.remove("active"));
        o.classList.add("active");
        vibOn = o.dataset.val === "on";
        save();
      });
      // theme opts
      document.getElementById("themeOpts").addEventListener("click", (e) => {
        const o = e.target.closest(".settings-opt");
        if (!o) return;
        document
          .querySelectorAll("#themeOpts .settings-opt")
          .forEach((x) => x.classList.remove("active"));
        o.classList.add("active");
        const themes = {
          dark: { bg0: "#070604", bg1: "#0e0c08", gold: "#c9a84c" },
          dusk: { bg0: "#08050e", bg1: "#100b18", gold: "#b87db0" },
          emerald: { bg0: "#040a07", bg1: "#080f0c", gold: "#3daa6a" },
        };
        const t = themes[o.dataset.val];
        document.documentElement.style.setProperty("--bg0", t.bg0);
        document.documentElement.style.setProperty("--bg1", t.bg1);
        document.documentElement.style.setProperty("--gold", t.gold);
        drawBG();
      });

      /* ═══════════════════ KEYBOARD ═══════════════════ */
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter") {
          e.preventDefault();
          doCount(null);
        }
        if (e.code === "KeyZ" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          doUndo();
        }
        if (e.code === "KeyR" && e.shiftKey) {
          e.preventDefault();
          doReset();
        }
      });

      /* ═══════════════════ BUTTONS ═══════════════════ */
      document.getElementById("undoBtn").addEventListener("click", doUndo);
      document.getElementById("resetBtn").addEventListener("click", doReset);
      document
        .getElementById("mainCountBtn")
        .addEventListener("click", doCount);

      /* ═══════════════════ INIT ═══════════════════ */
      load();
      // set lang pill
      document
        .querySelectorAll(".lang-pill")
        .forEach((p) =>
          p.classList.toggle("active", p.dataset.lang === currentLang),
        );
      // set design tab
      document
        .querySelectorAll(".design-tab")
        .forEach((t) =>
          t.classList.toggle("active", t.dataset.d === currentDesign),
        );
      // set sound
      document.getElementById("soundToggle").textContent = soundOn
        ? "🔔"
        : "🔕";
      buildDhikrRow();
      renderDesign();
      updateStatsUI();
      updateProgress();
      updateBeads();

      // cyber bar blink
      setInterval(() => {
        if (currentDesign === "cyber") updateCyberBars();
      }, 800);

      // rosary auto-spin on idle (gentle)
      setInterval(() => {
        if (currentDesign === "rosary") updateRosarySVG();
      }, 2000);
    </script>
  </body>
</html>
